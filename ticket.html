<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your Ticket — UniTickets</title>
    <link rel="stylesheet" href="appStyles.css">
    <link rel="stylesheet" href="buyTicketStyles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>
      (function() {
        const savedTheme = localStorage.getItem('unitickets-theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      .ticket-container { max-width: 700px; margin: 40px auto; background: var(--bg-elevated); border-radius: 18px; box-shadow: 0 8px 32px rgba(15,23,42,0.08); padding: 32px 18px; }
      .download-btn { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="ticket-container" id="ticketDisplay"></div>
    <div style="text-align:center;">
      <button id="downloadTicketBtn" class="btn btn-success download-btn">
        <i class="fa-solid fa-download"></i> Download Ticket
      </button>
    </div>
  <script src="logger.js"></script>
  <script src="toast.js"></script>
  <script src="scriptTicket.js"></script>
</body>
</html>
