<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>University E-ticketing System</title>
</head>
<body>
    <div class="toggle">
        <span class="toggle-label">
            <i class="fa-regular fa-moon"></i>
                Dark Mode
        </span>

        <label class="toggle-switch">
            <input type="checkbox" id="darkToggle" />
                <span class="toggle-slider"></span>
        </label>
    </div>

  <!-- LOGO -->
    <div class="nav-logo">
        U
    </div>

  <!-- AUTH WRAPPER -->
    <main class="auth">
        <section class="left">
            <div>
                <h1>
                    Hello, Welcome
                </h1>

                <p>
                    Don’t have an account yet?
                </p>

                <button type="button" class="btn btn-light" id="registerBtn">
                    <i class="fa-solid fa-user-plus"></i>
                        Register
                </button>
            </div>
        </section>

        <section class="right">
            <header class="right-header">
                <h2>
                    Login
                </h2>
                    
                <p class="right-subtitle" id="rightSubtitle">
                    Use your student credentials to access your dashboard.
                </p>
            </header>

            <!-- Login Mode Toggle -->
            <div class="login-mode-toggle">
                <button type="button" class="mode-btn active" id="studentModeBtn">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Student
                </button>
                <button type="button" class="mode-btn" id="adminModeBtn">
                    <i class="fa-solid fa-shield"></i>
                    Administrator
                </button>
            </div>

            <form id="loginForm" novalidate>
                <!-- Student Fields -->
                <div id="studentFields">
                    <div class="input-group">
                        <label for="studentId">
                            Student ID
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="studentId" placeholder="Enter your student ID" value="201109012" required />
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" value="demo1234" required />
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <p class="demo-note">
                        Demo credentials: 
                        <strong>ID:</strong> 201109012 &nbsp;|&nbsp; 
                        <strong>Password:</strong> demo1234
                    </p>
                </div>

                <!-- Admin Fields -->
                <div id="adminFields" style="display: none;">
                    <div class="input-group">
                        <label for="adminEmail">
                            Admin Email
                        </label>
                        <div class="input-wrapper">
                            <input type="email" id="adminEmail" placeholder="Enter admin email" value="admin@university.edu" required />
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="adminPassword">
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="adminPassword" placeholder="Enter your password" value="admin1234" required />
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <p class="demo-note">
                        Demo credentials: 
                        <strong>Email:</strong> admin@university.edu &nbsp;|&nbsp; 
                        <strong>Password:</strong> admin1234
                    </p>
                </div>

                <p class="forgot">
                    <a href="#">
                        Forgot password?
                    </a>
                </p>

                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Login
                </button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
