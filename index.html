<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>University E-ticketing System</title>
</head>
<body>
    <div class="toggle">
        <span class="toggle-label">
            <i class="fa-regular fa-moon"></i>
                Dark Mode
        </span>

        <label class="toggle-switch">
            <input type="checkbox" id="darkToggle" />
                <span class="toggle-slider"></span>
        </label>
    </div>

  <!-- LOGO -->
    <div class="nav-logo">
        U
    </div>

  <!-- AUTH WRAPPER -->
    <main class="auth">
        <section class="left">
            <div>
                <h1>
                    Hello, Welcome
                </h1>

                <p>
                    Don’t have an account yet?
                </p>

                <button type="button" class="btn btn-light" id="registerBtn">
                    <i class="fa-solid fa-user-plus"></i>
                        Register
                </button>
            </div>
        </section>

        <section class="right">
            <header class="right-header">
                <h2>
                    Login
                </h2>
                    
                <p class="right-subtitle" id="rightSubtitle">
                    Use your student credentials to access your dashboard.
                </p>
            </header>

            <!-- Login Mode Toggle -->
            <div class="login-mode-toggle">
                <button type="button" class="mode-btn active" id="studentModeBtn">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Student
                </button>
                <button type="button" class="mode-btn" id="adminModeBtn">
                    <i class="fa-solid fa-shield"></i>
                    Administrator
                </button>
            </div>

            <form id="loginForm" novalidate>
                <!-- Student Fields -->
                <div id="studentFields">
                    <div class="input-group">
                        <label for="studentId">
                            Student ID
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="studentId" placeholder="Enter your student ID" value="201109012" required />
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" value="demo1234" required />
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <p class="demo-note">
                        Demo credentials: 
                        <strong>ID:</strong> 201109012 &nbsp;|&nbsp; 
                        <strong>Password:</strong> demo1234
                    </p>
                </div>

                <!-- Admin Fields -->
                <div id="adminFields" style="display: none;">
                    <div class="input-group">
                        <label for="adminEmail">
                            Admin Email
                        </label>
                        <div class="input-wrapper">
                            <input type="email" id="adminEmail" placeholder="Enter admin email" value="admin@university.edu" required />
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="adminPassword">
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="adminPassword" placeholder="Enter your password" value="admin1234" required />
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <p class="demo-note">
                        Demo credentials: 
                        <strong>Email:</strong> admin@university.edu &nbsp;|&nbsp; 
                        <strong>Password:</strong> admin1234
                    </p>
                </div>

                <p class="forgot">
                    <a href="#">
                        Forgot password?
                    </a>
                </p>

                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Login
                </button>
            </form>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById("loginForm");
        const studentModeBtn = document.getElementById("studentModeBtn");
        const adminModeBtn = document.getElementById("adminModeBtn");
        const studentFields = document.getElementById("studentFields");
        const adminFields = document.getElementById("adminFields");
        const rightSubtitle = document.getElementById("rightSubtitle");

        let loginMode = "student"; // default mode

        // Toggle between Student and Admin login
        function setLoginMode(mode) {
            loginMode = mode;
            
            if (mode === "student") {
                studentFields.style.display = "block";
                adminFields.style.display = "none";
                studentModeBtn.classList.add("active");
                adminModeBtn.classList.remove("active");
                rightSubtitle.innerText = "Use your student credentials to access your dashboard.";
            } else {
                studentFields.style.display = "none";
                adminFields.style.display = "block";
                studentModeBtn.classList.remove("active");
                adminModeBtn.classList.add("active");
                rightSubtitle.innerText = "Use your administrator credentials to manage events and users.";
            }
        }

        studentModeBtn.addEventListener("click", () => setLoginMode("student"));
        adminModeBtn.addEventListener("click", () => setLoginMode("admin"));

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();

            if (loginMode === "student") {
                const studentId = document.getElementById("studentId").value.trim();
                const password = document.getElementById("password").value.trim();

                if (studentId === "201109012" && password === "demo1234") {
                    alert("Login successful! Welcome, Student.");
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid credentials. Use demo: 201109012 / demo1234");
                }
            } else {
                const adminEmail = document.getElementById("adminEmail").value.trim();
                const adminPassword = document.getElementById("adminPassword").value.trim();

                if (adminEmail === "admin@university.edu" && adminPassword === "admin1234") {
                    alert("Login successful! Welcome, Administrator.");
                    // Redirect to admin dashboard (create admin-dashboard.html later)
                    window.location.href = "admin-dashboard.html";
                } else {
                    alert("Invalid credentials. Use demo: admin@university.edu / admin1234");
                }
            }
        });

        const toggle = document.getElementById("darkToggle");
        const body = document.body;

        function applyTheme(theme) {
            if (theme === "dark") {
                body.classList.add("dark");
                toggle.checked = true;
            } 
            else 
            {
                body.classList.remove("dark");
                toggle.checked = false;
            }
        }

        const savedTheme = localStorage.getItem("unitickets-theme");
        applyTheme(savedTheme || "light");

        toggle.addEventListener("change", () => {
        const newTheme = toggle.checked ? "dark" : "light";
        applyTheme(newTheme);
        localStorage.setItem("unitickets-theme", newTheme);
        });
    </script>
</body>
</html>
